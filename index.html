
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MBogard.com</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <!-- Favicons (matched to bogiebogard.io's MB mark) -->
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <meta name="msapplication-config" content="/favicon/browserconfig.xml">
    <meta name="theme-color" content="#0b1424">

    <!-- Critical inline CSS: webpack injects the real stylesheet via JS, so without
         this the page paints white with unstyled, left-justified menu text for a
         frame. This keeps a clean dark background + branded loader until ready. -->
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b1424; overflow: hidden; }

        /* Hide the HUD chrome until assets are loaded, then fade it in. */
        body:not(.is-ready) .settings,
        body:not(.is-ready) .site-toggle { opacity: 0; pointer-events: none; }
        .settings, .site-toggle { transition: opacity 0.5s ease 0.15s; }

        /* Full-screen loader shown over everything until the scene is ready. */
        #app-loading {
            position: fixed; inset: 0; z-index: 100; background: #0b1424;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        /* Whirlpool spinner — shared with the 2D portfolio (/portfolio/) for a
           consistent loading motif, recolored for the dark background here
           (light rings + cyan accent instead of the 2D site's black-on-white). */
        .cssload-whirlpool,
        .cssload-whirlpool::before,
        .cssload-whirlpool::after {
            position: absolute; top: 50%; left: 50%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-left-color: #38bdf8;
            border-radius: 874px;
        }
        .cssload-whirlpool {
            margin: -22px 0 0 -22px; height: 44px; width: 44px;
            animation: cssload-rotate 1150ms linear infinite;
        }
        .cssload-whirlpool::before {
            content: ""; margin: -20px 0 0 -20px; height: 38px; width: 38px;
            animation: cssload-rotate 1150ms linear infinite;
        }
        .cssload-whirlpool::after {
            content: ""; margin: -25px 0 0 -25px; height: 49px; width: 49px;
            animation: cssload-rotate 2300ms linear infinite;
        }
        @keyframes cssload-rotate { 100% { transform: rotate(360deg); } }
        body.is-ready #app-loading { opacity: 0; pointer-events: none; }
    </style>

    <!-- Shared ambient-music player (also included by /portfolio/) so the
         background track carries across between the game and the 2D site. -->
    <script src="/ambient.js" defer="defer"></script>
</head>
<body>

    <div id="app-loading"><div class="cssload-whirlpool"></div></div>

    <canvas class="canvas js-canvas"></canvas>

    <div class="settings js-settings">
        <button class="settings__gear js-settings-gear" type="button" aria-label="Settings" title="Settings">⚙</button>
        <div class="settings__panel js-settings-panel">
            <div class="settings__header">
                <span class="settings__title">Settings</span>
                <span class="settings__hint">drive &amp; explore</span>
            </div>
            <div class="settings__section">
                <div class="settings__label">Theme</div>
                <div class="settings__options js-theme-lab-options"></div>
            </div>
            <div class="settings__section">
                <div class="settings__label">
                    <span>Car Speed</span>
                    <span class="settings__value js-speed-value">1.00×</span>
                </div>
                <input class="settings__slider js-speed-slider" type="range" min="0.5" max="2" step="0.05" value="1">
            </div>
            <div class="settings__section">
                <div class="settings__label">Music</div>
                <button class="settings__music-toggle js-music-toggle" type="button">Music: On</button>
                <div class="settings__credit">
                    &ldquo;Warm Spot&rdquo; &middot; Bosnow<br>
                    Music from Uppbeat
                </div>
            </div>
        </div>
    </div>

    <a class="site-toggle js-site-toggle" href="/portfolio/">View 2D site &rarr;</a>

    <div class="chase-timer js-chase-timer">
        <div class="chase-timer__notice js-chase-notice"></div>
        <div class="chase-timer__row">
            <span class="chase-timer__label">Time</span>
            <span class="chase-timer__value js-chase-current">0.0s</span>
        </div>
        <div class="chase-timer__row">
            <span class="chase-timer__label">Best</span>
            <span class="chase-timer__value js-chase-best">0.0s</span>
        </div>
        <button class="chase-timer__toggle js-chase-toggle" type="button">Chase: On</button>
    </div>

    <div class="threejs-journey is-hover-none js-threejs-journey">
    </div>

<script type="text/javascript" src="bundle.fc0271b0e72fd08cd592.js"></script></body>
</html>
